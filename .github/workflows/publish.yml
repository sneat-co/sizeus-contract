name: Publish contract

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch or tag) to publish from (default - the default branch)
        required: false
        default: ""

jobs:
  publish:
    uses: sneat-co/cicd/.github/workflows/npm-publish.yml@main
    with:
      working-directory: frontend
      ref: ${{ inputs.ref }}
      publish-command: pnpm publish --no-git-checks --access public
    secrets: inherit
